name: Init
description: Init
runs:
  using: composite
  steps:
    - name: Init NodeJS
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install Packages
      run: npm ci
      shell: bash

    - name: Generate Swagger & OpenAPI code
      run: npm run codegen
      shell: bash
