name: PR
on:
  pull_request:
    branches: ['*']
jobs:
  init:
    name: Init
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: Init
        uses: ./.github/actions/init
      - name: Cache
        uses: actions/cache@v3
        id: cache
        with:
          path: ./*
          key: ${{ github.sha }}
  check:
    name: Check
    runs-on: ubuntu-latest
    needs: [init]
    steps:
      - name: Cache
        uses: actions/cache@v3
        id: cache
        with:
          path: ./*
          key: ${{ github.sha }}
      - name: Init NodeJS
        uses: actions/setup-node@v3
        with:
          node-version: '23.x'
          cache: 'npm'
      - name: Check
        run: npm run ci:check
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [init]
    steps:
      - name: Cache
        uses: actions/cache@v3
        id: cache
        with:
          path: ./*
          key: ${{ github.sha }}
      - name: Init NodeJS
        uses: actions/setup-node@v3
        with:
          node-version: '23.x'
          cache: 'npm'
      - name: Build
        run: npm run build
